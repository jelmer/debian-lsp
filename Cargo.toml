[package]
name = "debian-lsp"
version = "0.1.3"
edition = "2021"
authors = ["Jelmer Vernooĳ <jelmer@debian.org>"]
description = "Language Server Protocol implementation for Debian control files with field completion, diagnostics, and quickfixes"
readme = "README.md"
license = "MIT OR Apache-2.0"
repository = "https://github.com/jelmer/debian-lsp"
keywords = ["lsp", "debian", "control", "language-server"]
categories = ["development-tools", "text-editors"]

[dependencies]
# debian-analyzer = "0.159.0"
chrono = "0.4"
debian-changelog = "0.2.15"
debian-control = { version = "0.3.0" }
debian-copyright = { version = "0.1.43", features = ["lossless"] }
debian-watch = { version = "0.4.4", features = ["linebased", "deb822"] }
distro-info = "0.4"
rowan = "0.16.1"
deb822-lossless = { version = "0.5.12" }
tower-lsp-server = "0.23"
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
salsa = ">=0.23, <0.27"
text-size = "1.1"

[dev-dependencies]
tokio-test = "0.4"
tower = "0.5"
tower-service = "0.3"

[[bin]]
name = "debian-lsp"
test = true

[workspace]
members = [".", "zed-debian"]
resolver = "2"
