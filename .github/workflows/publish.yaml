---
name: Publish Extensions

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check-versions:
    name: Verify version consistency
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"

          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          VSCODE_VERSION=$(node -p "require('./vscode-debian/package.json').version")
          COC_VERSION=$(node -p "require('./coc-debian/package.json').version")

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "vscode-debian version: $VSCODE_VERSION"
          echo "coc-debian version: $COC_VERSION"

          FAILED=0
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$VSCODE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::vscode-debian version ($VSCODE_VERSION) does not match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$COC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::coc-debian version ($COC_VERSION) does not match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "All versions match tag $TAG_VERSION"

  build-lsp:
    name: Build LSP Server
    runs-on: ubuntu-latest
    needs: [check-versions]
    if: always() && (needs.check-versions.result == 'success' || needs.check-versions.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install base-files
        run: sudo apt-get update && sudo apt-get install -y base-files

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Upload LSP binary
        uses: actions/upload-artifact@v4
        with:
          name: debian-lsp-binary
          path: target/release/debian-lsp

  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: [build-lsp]
    defaults:
      run:
        working-directory: ./vscode-debian
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-debian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-debian-vsix
          path: vscode-debian/*.vsix

      - name: Publish to Open VSX Registry
        if: startsWith(github.ref, 'refs/tags/v') && secrets.OPENVSX_TOKEN != ''
        run: |
          npm install -g ovsx
          ovsx publish -p ${{ secrets.OPENVSX_TOKEN }}
        continue-on-error: true

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && secrets.VSCE_TOKEN != ''
        run: |
          npx vsce publish -p ${{ secrets.VSCE_TOKEN }}
        continue-on-error: true

  publish-coc:
    name: Publish coc-debian
    runs-on: ubuntu-latest
    needs: [build-lsp]
    defaults:
      run:
        working-directory: ./coc-debian
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: coc-debian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload coc-debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: coc-debian
          path: |
            coc-debian/lib/
            coc-debian/package.json
            coc-debian/README.md

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != ''
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-lsp, publish-vscode, publish-coc]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download LSP binary
        uses: actions/download-artifact@v4
        with:
          name: debian-lsp-binary
          path: ./artifacts/

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vscode-debian-vsix
          path: ./artifacts/

      - name: Download coc-debian
        uses: actions/download-artifact@v4
        with:
          name: coc-debian
          path: ./artifacts/coc-debian/

      - name: Create tarball for coc-debian
        run: |
          cd artifacts/coc-debian
          tar czf ../coc-debian.tar.gz .
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/debian-lsp
            artifacts/*.vsix
            artifacts/coc-debian.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
