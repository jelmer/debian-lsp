---
name: Publish Extensions

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  check-versions:
    name: Verify version consistency
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check versions match tag
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Tag version: $TAG_VERSION"

          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          VSCODE_VERSION=$(node -p "require('./vscode-debian/package.json').version")
          COC_VERSION=$(node -p "require('./coc-debian/package.json').version")

          echo "Cargo.toml version: $CARGO_VERSION"
          echo "vscode-debian version: $VSCODE_VERSION"
          echo "coc-debian version: $COC_VERSION"

          FAILED=0
          if [ "$CARGO_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Cargo.toml version ($CARGO_VERSION) does not match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$VSCODE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::vscode-debian version ($VSCODE_VERSION) does not match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$COC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::coc-debian version ($COC_VERSION) does not match tag ($TAG_VERSION)"
            FAILED=1
          fi
          if [ "$FAILED" -ne 0 ]; then
            exit 1
          fi
          echo "All versions match tag $TAG_VERSION"

  build-lsp:
    name: Build LSP Server (${{ matrix.target }})
    needs: [check-versions]
    if: always() && (needs.check-versions.result == 'success' || needs.check-versions.result == 'skipped')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            vscode-target: linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            vscode-target: linux-arm64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            vscode-target: darwin-x64
          - target: aarch64-apple-darwin
            os: macos-latest
            vscode-target: darwin-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install base-files
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y base-files

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --verbose
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload LSP binary
        uses: actions/upload-artifact@v7
        with:
          name: debian-lsp-${{ matrix.vscode-target }}
          path: target/${{ matrix.target }}/release/debian-lsp

  publish-vscode:
    name: Publish VS Code Extension (${{ matrix.vscode-target }})
    needs: [build-lsp]
    strategy:
      matrix:
        include:
          - vscode-target: linux-x64
          - vscode-target: linux-arm64
          - vscode-target: darwin-x64
          - vscode-target: darwin-arm64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./vscode-debian
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-debian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Download LSP binary
        uses: actions/download-artifact@v4
        with:
          name: debian-lsp-${{ matrix.vscode-target }}
          path: vscode-debian/bin/

      - name: Make binary executable
        run: chmod +x bin/debian-lsp

      - name: Package platform-specific extension
        run: npx vsce package --target ${{ matrix.vscode-target }}

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v7
        with:
          name: vscode-debian-vsix-${{ matrix.vscode-target }}
          path: vscode-debian/*.vsix

      - name: Publish to Open VSX Registry
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          npm install -g ovsx
          ovsx publish -p ${{ secrets.OPENVSX_TOKEN }} --target ${{ matrix.vscode-target }}
        env:
          OPENVSX_TOKEN: ${{ secrets.OPENVSX_TOKEN }}
        continue-on-error: true

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          npx vsce publish -p ${{ secrets.VSCE_TOKEN }} --target ${{ matrix.vscode-target }}
        continue-on-error: true

  publish-coc:
    name: Publish coc-debian
    runs-on: ubuntu-latest
    needs: [build-lsp]
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ./coc-debian
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
          cache-dependency-path: coc-debian/package-lock.json

      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload coc-debian artifact
        uses: actions/upload-artifact@v7
        with:
          name: coc-debian
          path: |
            coc-debian/lib/
            coc-debian/package.json
            coc-debian/README.md

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm publish --provenance

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-lsp, publish-vscode, publish-coc]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download LSP binaries
        uses: actions/download-artifact@v4
        with:
          pattern: debian-lsp-*
          path: ./artifacts/lsp-binaries/
          merge-multiple: false

      - name: Prepare LSP binaries for release
        run: |
          for dir in artifacts/lsp-binaries/debian-lsp-*/; do
            target=$(basename "$dir" | sed 's/debian-lsp-//')
            cp "$dir/debian-lsp" "artifacts/debian-lsp-${target}"
          done

      - name: Download VSIXes
        uses: actions/download-artifact@v4
        with:
          pattern: vscode-debian-vsix-*
          path: ./artifacts/vsix/
          merge-multiple: true

      - name: Download coc-debian
        uses: actions/download-artifact@v4
        with:
          name: coc-debian
          path: ./artifacts/coc-debian/

      - name: Create tarball for coc-debian
        run: |
          cd artifacts/coc-debian
          tar czf ../coc-debian.tar.gz .
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/debian-lsp-*
            artifacts/vsix/*.vsix
            artifacts/coc-debian.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
