---
name: Tests

"on": [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test Suite
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          components: rustfmt

      - name: Install base-files (Linux only)
        run: sudo apt-get update && sudo apt-get install -y base-files
        if: matrix.os == 'ubuntu-latest'

      - name: Install OpenSSL (Windows only)
        run: |
          vcpkg install openssl:x64-windows-static-md
          echo "OPENSSL_DIR=$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV
        if: matrix.os == 'windows-latest'

      - name: Check formatting
        run: cargo fmt --all -- --check
        if: matrix.os == 'ubuntu-latest'

      - name: Run tests
        run: cargo test --verbose

      - name: Build
        run: cargo build --verbose
