---
name: Publish Extensions

"on":
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build-lsp:
    name: Build LSP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install base-files
        run: sudo apt-get update && sudo apt-get install -y base-files

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Upload LSP binary
        uses: actions/upload-artifact@v4
        with:
          name: debian-lsp-binary
          path: target/release/debian-lsp

  publish-vscode:
    name: Publish VS Code Extension
    runs-on: ubuntu-latest
    needs: [build-lsp]
    defaults:
      run:
        working-directory: ./vscode-debian
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vscode-debian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Package extension
        run: npm run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-debian-vsix
          path: vscode-debian/*.vsix

      - name: Publish to Open VSX Registry
        if: startsWith(github.ref, 'refs/tags/v') && secrets.OPENVSX_TOKEN != ''
        run: |
          npm install -g ovsx
          ovsx publish -p ${{ secrets.OPENVSX_TOKEN }}
        continue-on-error: true

      - name: Publish to VS Code Marketplace
        if: startsWith(github.ref, 'refs/tags/v') && secrets.VSCE_TOKEN != ''
        run: |
          npx vsce publish -p ${{ secrets.VSCE_TOKEN }}
        continue-on-error: true

  publish-coc:
    name: Package coc-debian
    runs-on: ubuntu-latest
    needs: [build-lsp]
    defaults:
      run:
        working-directory: ./coc-debian
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: coc-debian/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload coc-debian artifact
        uses: actions/upload-artifact@v4
        with:
          name: coc-debian
          path: |
            coc-debian/lib/
            coc-debian/package.json
            coc-debian/README.md

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') && secrets.NPM_TOKEN != ''
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [build-lsp, publish-vscode, publish-coc]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download LSP binary
        uses: actions/download-artifact@v4
        with:
          name: debian-lsp-binary
          path: ./artifacts/

      - name: Download VSIX
        uses: actions/download-artifact@v4
        with:
          name: vscode-debian-vsix
          path: ./artifacts/

      - name: Download coc-debian
        uses: actions/download-artifact@v4
        with:
          name: coc-debian
          path: ./artifacts/coc-debian/

      - name: Create tarball for coc-debian
        run: |
          cd artifacts/coc-debian
          tar czf ../coc-debian.tar.gz .
          cd ../..

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/debian-lsp
            artifacts/*.vsix
            artifacts/coc-debian.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
