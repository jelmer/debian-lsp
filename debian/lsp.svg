<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0078D4"/>
      <stop offset="100%" stop-color="#50E6FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="32" fill="#0F172A"/>

  <!-- Nodes -->
  <circle cx="64" cy="64" r="10" fill="url(#grad)"/>
  <circle cx="192" cy="64" r="10" fill="url(#grad)"/>
  <circle cx="64" cy="192" r="10" fill="url(#grad)"/>
  <circle cx="192" cy="192" r="10" fill="url(#grad)"/>

  <!-- Central node -->
  <circle cx="128" cy="128" r="14" fill="#22C55E"/>

  <!-- Connections -->
  <line x1="128" y1="128" x2="64" y2="64" stroke="url(#grad)" stroke-width="2"/>
  <line x1="128" y1="128" x2="192" y2="64" stroke="url(#grad)" stroke-width="2"/>
  <line x1="128" y1="128" x2="64" y2="192" stroke="url(#grad)" stroke-width="2"/>
  <line x1="128" y1="128" x2="192" y2="192" stroke="url(#grad)" stroke-width="2"/>

  <!-- Brackets symbol (code) -->
  <text x="128" y="150" text-anchor="middle" font-size="48" fill="white" font-family="monospace">
    {"<>"}
  </text>
</svg>

